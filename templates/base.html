{% load static %}
<!DOCTYPE html>
<html lang="es" class="min-h-screen bg-slate-950 text-slate-100">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}RoutineTracker{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/alpinejs/3.12.0/cdn.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <style>html { font-family: 'Inter', sans-serif; } .dark { background: #0f172a; }</style>
</head>
<body x-data="themeToggle()" x-init="init()" :class="theme">
  <div class="min-h-screen bg-slate-950 text-slate-100">
    {% include 'partials/nav.html' %}
    <main class="mx-auto max-w-6xl px-4 py-8">
      {% include 'partials/messages.html' %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="{% static 'js/theme-toggle.js' %}"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
