{% extends 'base.html' %}

{% block title %}Registro · RoutineTracker{% endblock %}

{% block content %}
  <div class="mx-auto max-w-md rounded-3xl bg-slate-900 p-8 shadow-2xl ring-1 ring-slate-700/40">
    <h1 class="text-2xl font-semibold text-white">Crear cuenta</h1>
    <form method="post" class="mt-6 space-y-5">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="w-full rounded-full bg-emerald-500 px-4 py-3 font-semibold text-slate-950 hover:bg-emerald-400">Registrarse</button>
    </form>
    <p class="mt-4 text-sm text-slate-400">¿Ya tienes cuenta? <a class="text-emerald-400 hover:text-emerald-300" href="{% url 'login' %}">Inicia sesión</a></p>
  </div>
{% endblock %}
