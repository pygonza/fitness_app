{% extends 'base.html' %}

{% block title %}Perfil · RoutineTracker{% endblock %}

{% block content %}
  <div class="mx-auto max-w-3xl space-y-6">
    <section class="rounded-3xl bg-slate-900 p-6 shadow-lg ring-1 ring-slate-700/40">
      <h1 class="text-2xl font-semibold text-white">Mi perfil</h1>
      <div class="mt-4 grid gap-4 sm:grid-cols-2">
        <div class="rounded-2xl bg-slate-950 p-4">
          <p class="text-sm uppercase tracking-wide text-slate-500">Usuario</p>
          <p class="mt-2 text-lg text-white">{{ user.username }}</p>
          <p class="text-slate-400">{{ user.email }}</p>
        </div>
        <div class="rounded-2xl bg-slate-950 p-4">
          <p class="text-sm uppercase tracking-wide text-slate-500">Preferencias</p>
          <p class="mt-2 text-lg text-white">Unidad: {{ user.get_unit_preference_display }}</p>
          <p class="text-slate-400">Zona horaria: {{ user.timezone }}</p>
        </div>
      </div>
      <div class="mt-6">
        <a href="{% url 'users:profile_edit' %}" class="rounded-full bg-emerald-500 px-5 py-3 font-semibold text-slate-950 hover:bg-emerald-400">Editar perfil</a>
      </div>
    </section>
  </div>
{% endblock %}
